services:
  - type: web
    name: weather-heatmap
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && python manage.py collectstatic --noinput && gunicorn heatmap_project.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ${RENDER_EXTERNAL_HOSTNAME}
      - key: WEATHER_API_KEY
        sync: false
      - key: ARCGIS_API_KEY
        sync: false
  
  - type: pserv
    name: weather-heatmap-db
    env: postgres
    plan: free
    ipAllowList: []
    envVars:
      - key: POSTGRES_DB
        value: heatmap_db
      - key: POSTGRES_USER
        value: heatmap_user
